const STARS = Array.from({length: 320}, () => ({
  x: Math.random(), y: Math.random(),
  r: Math.random() * 1.4 + 0.3,
  a: Math.random() * 0.6 + 0.2,
  tw: Math.random() * Math.PI * 2
}));

const INCLINATION = 60 * Math.PI / 180;
const PERIOD = 9000;
let coronaPhase = 0;

function drawStars(t) {
  for (const s of STARS) {
    ctx.globalAlpha = s.a * (0.85 + 0.15 * Math.sin(s.tw + t * 0.0007));
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawSun(cx, cy) {
  [[100,'rgba(255,180,20,0.04)'],[80,'rgba(255,200,40,0.07)'],
   [60,'rgba(255,220,80,0.10)'],[44,'rgba(255,240,120,0.15)']].forEach(([r,c]) => {
    const gr = ctx.createRadialGradient(cx,cy,0,cx,cy,r);
    gr.addColorStop(0,c); gr.addColorStop(1,'transparent');
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fillStyle=gr; ctx.fill();
  });
  for (let i = 0; i < 18; i++) {
    const a = (i/18)*Math.PI*2 + coronaPhase;
    const len = 34 + 12*Math.sin(coronaPhase*3 + i*0.7);
    ctx.save(); ctx.translate(cx,cy); ctx.rotate(a);
    ctx.beginPath(); ctx.moveTo(20,0); ctx.lineTo(20+len,0);
    ctx.strokeStyle = 'rgba(255,230,100,'+(0.08+0.06*Math.sin(coronaPhase*2+i))+')';
    ctx.lineWidth = 2.5-(i%3)*0.6; ctx.stroke(); ctx.restore();
  }
  const sg = ctx.createRadialGradient(cx-6,cy-6,2,cx,cy,22);
  sg.addColorStop(0,'#fffbe0'); sg.addColorStop(0.3,'#ffe040');
  sg.addColorStop(0.7,'#ff9800'); sg.addColorStop(1,'#e65100');
  ctx.beginPath(); ctx.arc(cx,cy,22,0,Math.PI*2); ctx.fillStyle=sg; ctx.fill();
  ctx.beginPath(); ctx.arc(cx,cy,22,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,200,50,0.35)'; ctx.lineWidth=2; ctx.stroke();
}

function drawOrbitPath(cx, cy, rx) {
  const ry = rx * Math.cos(INCLINATION);
  ctx.save(); ctx.translate(cx,cy);
  ctx.beginPath(); ctx.ellipse(0,0,rx,ry,0,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,220,80,0.12)'; ctx.lineWidth=1;
  ctx.setLineDash([4,8]); ctx.stroke(); ctx.setLineDash([]);
  ctx.restore();
}

function getPos(t, cx, cy, rx) {
  const angle = (t/PERIOD)*Math.PI*2;
  return {
    x: cx + rx*Math.cos(angle),
    y: cy + rx*Math.cos(INCLINATION)*Math.sin(angle),
    depth: Math.sin(angle)
  };
}

function drawLogo(x, y, t) {
  const spin = (t/PERIOD)*Math.PI*2;
  const depth = Math.sin((t/PERIOD)*Math.PI*2);
  const sz = (0.78 + 0.22*depth) * Math.min(W,H) * 0.23;
  ctx.save();
  ctx.translate(x, y); ctx.rotate(spin);
  ctx.globalAlpha = 0.93 + 0.07*depth;
  ctx.drawImage(img, -sz/2, -sz/2, sz, sz);
  ctx.restore();
  ctx.globalAlpha = 1;
}

function frame(t) {
  ctx.clearRect(0,0,W,H);
  const bg = ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*0.7);
  bg.addColorStop(0,'#04071a'); bg.addColorStop(0.5,'#020510'); bg.addColorStop(1,'#000005');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  drawStars(t);
  coronaPhase = t * 0.0004;

  const cx=W/2, cy=H/2, rx=Math.min(W,H)*0.82;
  const pos = getPos(t, cx, cy, rx);
  drawOrbitPath(cx, cy, rx);

  if (pos.depth < 0) {
    drawLogo(pos.x, pos.y, t);
    drawSun(cx, cy);
  } else {
    drawSun(cx, cy);
    drawLogo(pos.x, pos.y, t);
  }

  requestAnimationFrame(frame);
}

img.onload = () => requestAnimationFrame(frame);
img.onerror = () => { console.error('Image failed to load'); requestAnimationFrame(frame); };
